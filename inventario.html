<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 1rem; }

  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

  .section-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

  /* Reparto selector */
  .dept-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 1.25rem; scrollbar-width: none; }
  .dept-scroll::-webkit-scrollbar { display: none; }
  .dept-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 99px; border: 1px solid #333; background: #1a1a1a; color: #aaa; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .dept-btn.active { background: #fff; color: #111; border-color: #fff; font-weight: 500; }

  /* Material dropdown */
  .mat-wrap { position: relative; margin-bottom: 1rem; }
  .mat-select-btn { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #eee; font-size: 15px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .mat-select-btn.has-value { color: #fff; }
  .mat-select-btn .arrow { color: #666; font-size: 12px; transition: transform 0.2s; }
  .mat-select-btn.open .arrow { transform: rotate(180deg); }

  .mat-panel { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; margin-top: 6px; }
  .mat-search { width: 100%; padding: 12px 16px; background: #222; border: none; border-bottom: 1px solid #2a2a2a; color: #eee; font-size: 15px; outline: none; }
  .mat-search::placeholder { color: #555; }
  .mat-list { max-height: 280px; overflow-y: auto; }
  .mat-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #1e1e1e; display: flex; flex-direction: column; gap: 2px; transition: background 0.1s; }
  .mat-item:last-child { border-bottom: none; }
  .mat-item:hover, .mat-item:active { background: #252525; }
  .mat-item.done { border-left: 3px solid #4a8; }
  .mat-item .item-name { font-size: 14px; color: #ddd; }
  .mat-item.done .item-name { color: #6db; }
  .mat-item .item-desc { font-size: 12px; color: #555; }
  .mat-item .item-code { font-size: 11px; color: #444; font-family: monospace; }
  .mat-item.done .item-code { color: #3a6; }
  .mat-empty { padding: 16px; text-align: center; color: #555; font-size: 14px; }

  /* Selected material card */
  .selected-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; margin-bottom: 1rem; }
  .selected-name { font-size: 16px; font-weight: 500; color: #fff; }
  .selected-desc { font-size: 12px; color: #666; margin-top: 2px; }
  .selected-code { font-size: 11px; color: #444; font-family: monospace; margin-top: 4px; }

  .qty-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .qty-input { flex: 1; padding: 11px 14px; background: #222; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 18px; font-weight: 500; text-align: center; outline: none; }
  .qty-input:focus { border-color: #555; }
  .qty-input::placeholder { color: #444; }
  .btn-add { padding: 11px 20px; background: #fff; color: #111; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-add:active { opacity: 0.85; transform: scale(0.98); }

  /* Log */
  .log-section { margin-top: 1.5rem; }
  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .log-badge { font-size: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 99px; padding: 3px 10px; color: #666; }
  .log-box { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 14px; font-family: 'Courier New', monospace; font-size: 13px; color: #aaa; min-height: 80px; max-height: 200px; overflow-y: auto; white-space: pre; line-height: 1.7; }
  .log-empty { color: #444; font-family: -apple-system, sans-serif; font-style: italic; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-copy { flex: 1; padding: 10px; font-size: 14px; border: 1px solid #333; border-radius: 10px; background: #1a1a1a; color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-copy:active { background: #222; }
  .btn-reset { padding: 10px 14px; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 10px; background: #1a1a1a; color: #555; cursor: pointer; }
  .btn-reset:active { background: #222; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #fff; color: #111; padding: 9px 20px; border-radius: 99px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <h1>📦 Inventario</h1>
  <p class="subtitle">Seleziona materiale, inserisci quantità, aggiungi al log</p>

  <p class="section-label">Reparto</p>
  <div class="dept-scroll" id="deptScroll"></div>

  <p class="section-label">Materiale</p>
  <div class="mat-wrap">
    <button class="mat-select-btn" id="matSelectBtn">
      <span id="matBtnLabel" style="color:#555">Scegli materiale...</span>
      <span class="arrow">▼</span>
    </button>
    <div class="mat-panel hidden" id="matPanel">
      <input type="text" class="mat-search" id="matSearch" placeholder="Cerca per nome o codice..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="mat-list" id="matList"></div>
    </div>
  </div>

  <div class="selected-card hidden" id="selectedCard">
    <div class="selected-name" id="selName"></div>
    <div class="selected-desc" id="selDesc"></div>
    <div class="selected-code" id="selCode"></div>
    <div class="qty-row">
      <input type="number" class="qty-input" id="qtyInput" min="1" placeholder="Qtà" inputmode="numeric" />
      <button class="btn-add" id="btnAdd">+ Aggiungi</button>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <p class="section-label" style="margin:0">Log finale</p>
      <span class="log-badge" id="logBadge">0 voci</span>
    </div>
    <div class="log-box" id="logBox"><span class="log-empty">Nessuna voce ancora...</span></div>
    <div class="btn-row">
      <button class="btn-copy" id="btnCopy">📋 Copia log</button>
      <button class="btn-reset" id="btnReset" title="Reset">🗑</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const DEPTS = ['Tutti', ...Array.from(new Set(MATERIALS.map(m => m.dept))).sort()];

let activeDept = 'Tutti';
let panelOpen = false;
let searchMode = false;
let selected = null;
let doneCodes = new Set();
let log = JSON.parse(localStorage.getItem('inv_log2') || '[]');
if (log.length) doneCodes = new Set(log.map(e => e.code));

// Dept buttons
const deptScroll = document.getElementById('deptScroll');
DEPTS.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'dept-btn' + (d === 'Tutti' ? ' active' : '');
  btn.textContent = d;
  btn.addEventListener('click', () => {
    activeDept = d;
    document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList('');
    if (panelOpen) document.getElementById('matSearch').value = '';
  });
  deptScroll.appendChild(btn);
});

// Panel toggle
const matSelectBtn = document.getElementById('matSelectBtn');
const matPanel = document.getElementById('matPanel');
const matSearch = document.getElementById('matSearch');
const matList = document.getElementById('matList');
const matBtnLabel = document.getElementById('matBtnLabel');

matSelectBtn.addEventListener('click', () => {
  if (panelOpen) {
    closePanel();
  } else {
    openPanel();
  }
});

function openPanel() {
  panelOpen = true;
  matPanel.classList.remove('hidden');
  matSelectBtn.classList.add('open');
  renderList('');
  setTimeout(() => matSearch.focus(), 100);
}

function closePanel() {
  panelOpen = false;
  matPanel.classList.add('hidden');
  matSelectBtn.classList.remove('open');
  matSearch.value = '';
}

matSearch.addEventListener('input', () => {
  renderList(matSearch.value);
});

function getFiltered(query) {
  let list = activeDept === 'Tutti' ? MATERIALS : MATERIALS.filter(m => m.dept === activeDept);
  if (query.trim()) {
    const q = query.trim().toLowerCase();
    list = list.filter(m => m.name.toLowerCase().includes(q) || m.code.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q));
  }
  // Done items go to bottom
  const notDone = list.filter(m => !doneCodes.has(m.code));
  const done = list.filter(m => doneCodes.has(m.code));
  return [...notDone, ...done];
}

function renderList(query) {
  const items = getFiltered(query);
  if (items.length === 0) {
    matList.innerHTML = '<div class="mat-empty">Nessun risultato</div>';
    return;
  }
  matList.innerHTML = items.map(m => `
    <div class="mat-item ${doneCodes.has(m.code) ? 'done' : ''}" data-code="${m.code}">
      <span class="item-name">${m.name}</span>
      ${m.desc ? `<span class="item-desc">${m.desc}</span>` : ''}
      <span class="item-code">${m.code}</span>
    </div>
  `).join('');
  matList.querySelectorAll('.mat-item').forEach(el => {
    el.addEventListener('click', () => selectMaterial(el.dataset.code));
  });
}

function selectMaterial(code) {
  selected = MATERIALS.find(m => m.code === code);
  matBtnLabel.textContent = selected.name;
  matBtnLabel.style.color = '#eee';
  closePanel();
  document.getElementById('selName').textContent = selected.name;
  document.getElementById('selDesc').textContent = selected.desc || '';
  document.getElementById('selCode').textContent = selected.code;
  document.getElementById('selectedCard').classList.remove('hidden');
  document.getElementById('qtyInput').value = '';
  document.getElementById('qtyInput').focus();
}

// Add to log
document.getElementById('btnAdd').addEventListener('click', addEntry);
document.getElementById('qtyInput').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

function addEntry() {
  if (!selected) return;
  const qty = document.getElementById('qtyInput').value.trim();
  if (!qty || isNaN(qty) || Number(qty) < 1) { showToast('Inserisci una quantità valida'); return; }
  log.push({ code: selected.code, name: selected.name, qty: parseInt(qty) });
  doneCodes.add(selected.code);
  localStorage.setItem('inv_log2', JSON.stringify(log));
  renderLog();
  showToast('✓ ' + selected.name);
  // Reset
  selected = null;
  matBtnLabel.textContent = 'Scegli materiale...';
  matBtnLabel.style.color = '#555';
  document.getElementById('selectedCard').classList.add('hidden');
  document.getElementById('qtyInput').value = '';
  renderList(matSearch.value);
}

// Log
function renderLog() {
  const box = document.getElementById('logBox');
  const badge = document.getElementById('logBadge');
  if (log.length === 0) {
    box.innerHTML = '<span class="log-empty">Nessuna voce ancora...</span>';
    badge.textContent = '0 voci';
  } else {
    box.textContent = log.map(e => `${e.code}\n${e.qty}`).join('\n');
    badge.textContent = log.length + (log.length === 1 ? ' voce' : ' voci');
    box.scrollTop = box.scrollHeight;
  }
}

document.getElementById('btnCopy').addEventListener('click', () => {
  if (log.length === 0) { showToast('Log vuoto'); return; }
  const text = log.map(e => `${e.code}\n${e.qty}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Log copiato!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Log copiato!');
  });
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (log.length === 0) return;
  if (confirm('Cancellare tutto il log e resettare i materiali compilati?')) {
    log = []; doneCodes = new Set();
    localStorage.removeItem('inv_log2');
    renderLog();
    renderList('');
    showToast('Log cancellato');
  }
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderLog();
</script>
